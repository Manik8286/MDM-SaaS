name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_API_SERVICE: ${{ secrets.ECS_API_SERVICE }}
  ECS_WORKER_SERVICE: ${{ secrets.ECS_WORKER_SERVICE }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Run unit tests
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install --no-cache-dir ".[dev]"

      - name: Run unit tests
        run: |
          if [ -d "tests" ]; then
            pytest tests/unit/ -v --tb=short
          else
            echo "No tests/ directory found — skipping tests"
          fi

  # ---------------------------------------------------------------------------
  # Job 2: Build Docker image and push to ECR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: test

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="${ECR_REPOSITORY}:${IMAGE_TAG}"
          IMAGE_LATEST="${ECR_REPOSITORY}:latest"

          docker build \
            --tag "${IMAGE_URI}" \
            --tag "${IMAGE_LATEST}" \
            --label "git-commit=${IMAGE_TAG}" \
            --label "build-date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            .

          docker push "${IMAGE_URI}"
          docker push "${IMAGE_LATEST}"

          echo "image=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "Pushed: ${IMAGE_URI}"

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to ECS
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run database migrations via ECS run-task
        run: |
          echo "Running Alembic migrations..."
          TASK_ARN=$(aws ecs run-task \
            --cluster "${ECS_CLUSTER}" \
            --task-definition "${ECS_CLUSTER}-api" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.SUBNET_ID }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP_ID }}],assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["python","-m","alembic","upgrade","head"],"environment":[{"name":"MIGRATE","value":"0"}]}]}' \
            --query "tasks[0].taskArn" \
            --output text)
          echo "Migration task ARN: ${TASK_ARN}"

          echo "Waiting for migration task to complete..."
          aws ecs wait tasks-stopped \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${ECS_CLUSTER}" \
            --tasks "${TASK_ARN}" \
            --query "tasks[0].containers[0].exitCode" \
            --output text)

          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Migration task failed with exit code ${EXIT_CODE}"
            exit 1
          fi
          echo "Migrations completed successfully."

      - name: Force new deployment — API service
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_API_SERVICE}" \
            --force-new-deployment \
            --output json | jq '.service.serviceName + " deployment triggered"'

      - name: Force new deployment — Worker service
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_WORKER_SERVICE}" \
            --force-new-deployment \
            --output json | jq '.service.serviceName + " deployment triggered"'

      - name: Wait for API service to stabilise
        run: |
          echo "Waiting for API service to reach steady state (up to 10 minutes)..."
          aws ecs wait services-stable \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_API_SERVICE}"
          echo "API service is stable."

      - name: Deployment summary
        run: |
          echo "====================================================="
          echo "Deployment complete"
          echo "Image: ${{ needs.build-and-push.outputs.image }}"
          echo "Cluster: ${ECS_CLUSTER}"
          echo "API service: ${ECS_API_SERVICE}"
          echo "Worker service: ${ECS_WORKER_SERVICE}"
          echo "Commit: ${{ github.sha }}"
          echo "====================================================="
